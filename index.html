<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finanças">
<meta name="theme-color" content="#0a0b0d">
<title>PULSE · Finanças</title>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0b0d;--card:#15181e;--card2:#0c0e12;--line:rgba(255,255,255,.08);--text:#eceef1;--muted:#868d97;--dim:#3a4049;--accent:#e8824e;--accent-d:#cf6a36;--ink:#1c1206;--blue:#58a6ff;--warn:#ff4d4d}
body{background:var(--bg);color:var(--text);font-family:'Hanken Grotesk',-apple-system,system-ui,sans-serif;min-height:100dvh;-webkit-font-smoothing:antialiased}
.disp{font-family:'Big Shoulders Display',-apple-system,system-ui,sans-serif;font-weight:800;letter-spacing:.01em}
input{-webkit-appearance:none;font-family:inherit}
input[type=number]{-moz-appearance:textfield}
input::-webkit-inner-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{display:none}
.pg{padding:18px 16px 96px;max-width:560px;margin:0 auto}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.logo{display:flex;align-items:center;gap:8px;font-size:20px;letter-spacing:.16em}
.logo .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent)}
.gear{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px}
.lb{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin:0 0 10px}
.lb.mt{margin-top:24px}
h1.pgh{font-size:26px;margin:0 0 16px}
.dp{background:linear-gradient(135deg,rgba(232,130,78,.16),rgba(12,14,18,.5));border:1px solid rgba(232,130,78,.32);border-radius:18px;padding:20px;margin-bottom:14px}
.dp .eyebrow{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
.dp .big{font-size:38px;line-height:1;margin:8px 0 2px}
.dp .big small{font-size:18px;color:var(--muted)}
.bar{height:12px;border-radius:8px;background:#0c0e12;border:1px solid var(--line);overflow:hidden;margin:12px 0 6px}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent-d),var(--accent));border-radius:8px;transition:width .6s cubic-bezier(.2,.7,.3,1)}
.dp .meta{font-size:13px;color:var(--muted)}
.badge{display:inline-block;font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em}
.badge.live{background:rgba(232,130,78,.16);color:var(--accent)}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:12px}
.row{display:flex;justify-content:space-between;align-items:center}
.prow{display:flex;justify-content:space-between;align-items:baseline;font-size:14.5px;font-weight:700;margin:14px 0 0}
.prow .who{font-size:15px}.prow .amt{color:var(--accent)}
.sub{font-size:12.5px;color:var(--muted);font-weight:600}
.split2{display:flex;gap:18px;margin-top:10px}
.split2 .s .n{font-size:12px;color:var(--muted);font-weight:700}
.split2 .s .v{font-size:20px;color:var(--accent);margin-top:2px}
.grp{font-size:11px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.07em;margin:16px 0 2px;padding-top:10px;border-top:1px solid var(--line)}
.card .grp:first-of-type{border-top:none;padding-top:2px;margin-top:0}
.tr{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 0;border-top:1px solid var(--line)}
.grp + .tr{border-top:none}
.tr.off{opacity:.4}
.tr .tl{font-size:14.5px}
.tr .ta{font-size:12px;color:var(--muted);margin-top:2px}
.sw{flex-shrink:0;width:50px;height:30px;border-radius:16px;background:#0c0e12;border:1px solid var(--line);position:relative;cursor:pointer;transition:.18s}
.sw i{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:var(--dim);transition:.18s}
.sw.on{background:var(--accent);border-color:var(--accent)}
.sw.on i{left:25px;background:var(--ink)}
.sw.busy{opacity:.5}
.chk{flex-shrink:0;width:30px;height:30px;border-radius:9px;background:#0c0e12;border:1.5px solid var(--dim);position:relative;cursor:pointer;transition:.15s}
.chk.on{background:var(--accent);border-color:var(--accent)}
.chk.on::after{content:'';position:absolute;left:10px;top:5px;width:7px;height:13px;border:solid var(--ink);border-width:0 3px 3px 0;transform:rotate(45deg)}
.chk.busy{opacity:.5}
.dbt{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;padding:11px 0;border-top:1px solid var(--line)}
.dbt:first-child{border-top:none}
.dbt .dl{font-size:14px}.dbt .dn{font-size:12px;color:var(--muted);margin-top:2px}
.dbt .dv{font-weight:800;color:var(--accent);white-space:nowrap}
.mini{background:rgba(232,130,78,.14);border:1px solid rgba(232,130,78,.4);color:var(--accent);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:4px}
.btns{display:flex;gap:8px;margin:14px 0 4px;flex-wrap:wrap}
.btns button{flex:1;min-width:130px;border-radius:12px;padding:13px;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit;border:1px solid var(--line);background:var(--card2);color:var(--text)}
.btns button.pri{background:var(--accent);color:var(--ink);border:none}
.field{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.field span{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.inp{width:100%;background:var(--card2);border:2px solid var(--line);border-radius:12px;padding:14px;color:var(--text);font-size:16px;outline:none;font-family:inherit}
.inp:focus{border-color:var(--accent)}
.cta{width:100%;padding:16px;border:none;border-radius:13px;background:var(--accent);color:var(--ink);font-size:17px;font-weight:900;cursor:pointer;font-family:'Big Shoulders Display',sans-serif;letter-spacing:.04em}
.seg{display:flex;gap:6px;background:#0c0e12;border:1px solid var(--line);border-radius:11px;padding:4px;flex-wrap:wrap}
.seg button{flex:1;min-width:80px;background:none;border:none;color:var(--muted);font-family:inherit;font-weight:800;padding:9px;border-radius:8px;cursor:pointer}
.seg button.on{background:var(--accent);color:var(--ink)}
.overlay{position:fixed;inset:0;z-index:60;background:rgba(5,6,8,.8);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center}
.sheet{width:100%;max-width:560px;background:var(--card);border:1px solid var(--line);border-radius:20px 20px 0 0;padding:22px 18px max(22px,env(safe-area-inset-bottom))}
.sheet h3{font-size:22px;margin:0 0 14px}
.mclose{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;float:right;line-height:1}
.nav{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;justify-content:space-around;background:rgba(13,15,19,.94);backdrop-filter:blur(16px);border-top:1px solid var(--line);padding:8px 4px calc(8px + env(safe-area-inset-bottom,0px))}
.nav button{flex:1;background:none;border:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:4px;font-family:inherit;font-weight:700;font-size:10px;cursor:pointer;padding:4px 0}
.nav button.on{color:var(--accent)}
.nav svg{width:22px;height:22px}
.center{min-height:100dvh;display:flex;flex-direction:column;justify-content:center;padding:24px 18px;max-width:440px;margin:0 auto}
.spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--ink);padding:10px 22px;border-radius:11px;font-weight:800;font-size:13.5px;z-index:99;animation:fo 2.6s forwards}
.toast.err{background:var(--warn);color:#fff}
@keyframes fo{0%,72%{opacity:1}100%{opacity:0}}
.err-msg{background:rgba(255,77,77,.12);border:1px solid rgba(255,77,77,.4);color:#ff9c9c;padding:12px 14px;border-radius:10px;font-size:13.5px;margin-bottom:14px;line-height:1.45}
.muted{color:var(--muted);font-size:13px}
.pill{display:inline-flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--line);border-radius:20px;padding:5px 12px;font-size:12.5px;font-weight:700;color:var(--muted)}
</style>
</head>
<body>
<div id="app"></div>
<script>
const BAKED_URL = "https://script.google.com/macros/s/AKfycbzayIZsncTqmOfGxqFGVf__qydaHwpDKFlMGbeHoQJurpkK8Hd5uxqXEe-sHJrMpBUz/exec";
let API = localStorage.getItem('fin_api') || BAKED_URL || "";
let PW  = localStorage.getItem('fin_pw')  || "";
let S=null, VIEW='home', TT=null, MODAL=null, BUSY=false;
const $=()=>document.getElementById('app');
const eur=n=>'€'+Math.round(Number(n)||0).toLocaleString('pt-PT');
const clamp=p=>Math.max(0,Math.min(100,p||0));

async function api(action, extra){
  const body=JSON.stringify(Object.assign({action,password:PW},extra||{}));
  const res=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body,redirect:'follow'});
  const j=await res.json();
  if(!j.ok){ if(j.error==='auth'){ const e=new Error('auth'); e.auth=true; throw e; } throw new Error(j.error||'erro'); }
  return j.data;
}
function toast(msg,err){ TT={msg,err}; render(); setTimeout(()=>{TT=null;render();},2600); }
async function boot(){
  if(!API||!PW){ VIEW='setup'; render(); return; }
  VIEW='loading'; render();
  try{ S=await api('state'); VIEW='home'; render(); }
  catch(e){ if(e.auth){ localStorage.removeItem('fin_pw'); PW=''; VIEW='setup'; render(); toast('Password errada',true);} else { VIEW='error'; render(); } }
}
function logout(){ localStorage.removeItem('fin_pw'); PW=''; S=null; VIEW='setup'; render(); }

function render(){
  const a=$();
  if(VIEW==='setup'){ a.innerHTML=vSetup(); return; }
  if(VIEW==='loading'){ a.innerHTML='<div class="center"><div class="spin"></div></div>'+tt(); return; }
  if(VIEW==='error'){ a.innerHTML='<div class="center"><div class="err-msg">Não consegui ligar à folha.</div><button class="cta" onclick="boot()">Tentar de novo</button><button class="gear" style="margin-top:14px" onclick="logout()">Mudar definições</button></div>'; return; }
  let h='';
  if(VIEW==='home') h=vHome();
  if(VIEW==='conjunta') h=vConjunta();
  if(VIEW==='guia') h=vGuia();
  if(VIEW==='pessoal') h=vPessoal();
  a.innerHTML=h+nav()+(MODAL?MODAL():'')+tt();
}
function tt(){ return TT?`<div class="toast ${TT.err?'err':''}">${TT.msg}</div>`:''; }
function go(v){ VIEW=v; render(); }
function header(){ return `<div class="top"><div class="logo disp"><span class="dot"></span>FINANÇAS</div><button class="gear" onclick="logout()">⚙</button></div>`; }
function bar(pct){ return `<div class="bar"><i style="width:${clamp(pct)}%"></i></div>`; }

function vSetup(){
  return `<div class="center">
    <div class="logo disp" style="font-size:24px;margin-bottom:6px"><span class="dot"></span>FINANÇAS</div>
    <p class="sub" style="margin-bottom:22px">Bruno &amp; Laura</p>
    ${BAKED_URL?'':`<label class="field"><span>Link da app</span><input id="s_url" class="inp" placeholder="https://script.google.com/.../exec"></label>`}
    <label class="field"><span>Password partilhada</span><input id="s_pw" class="inp" type="password" placeholder="••••••••"></label>
    <button class="cta" onclick="saveSetup()">Ligar</button>
    <p class="muted" style="margin-top:16px;text-align:center">Os dados ficam na vossa folha Google. Isto só guarda o acesso neste telemóvel.</p>
  </div>`;
}
function saveSetup(){
  const url=BAKED_URL||document.getElementById('s_url').value.trim(); const pw=document.getElementById('s_pw').value;
  if(!url){ toast('Falta o link',true); return; } if(!pw){ toast('Falta a password',true); return; }
  API=url; PW=pw; $().innerHTML='<div class="center"><div class="spin"></div></div>';
  api('state').then(d=>{ S=d; localStorage.setItem('fin_api',API); localStorage.setItem('fin_pw',PW); VIEW='home'; render(); })
    .catch(e=>{ VIEW='setup'; render(); toast(e.auth?'Password errada':'Não consegui ligar',true); });
}

/* ===== INÍCIO ===== */
function fundCol(f){ if(f.external>0 || /loan|empr|sister|aunt|irm|tia/i.test(f.source)) return 'external'; if(f.laura>0 || /laura|dad|pai/i.test(f.source)) return 'laura'; return 'bruno'; }
function fundVal(f){ return f.bruno+f.laura+f.external; }
function vHome(){
  const c=S.contrib;
  if(!c){ return `<div class="pg">${header()}<div class="err-msg">Falta criar as tabs. Corre setupTudo e recarrega.</div></div>`; }
  const pct=c.target?c.total/c.target*100:0, gap=Math.max(0,c.target-c.total);
  let h=`<div class="pg">${header()}
  <div class="dp">
    <div class="row"><div class="eyebrow">Bolo da casa</div><span class="badge live">em curso</span></div>
    <div class="big disp">${eur(c.total)}<small> / ${eur(c.target)}</small></div>${bar(pct)}
    <div class="meta">Faltam <b style="color:var(--text)">${eur(gap)}</b> · ${Math.round(pct)}% do alvo</div>
    <div class="split2"><div class="s"><div class="n">Bruno</div><div class="v disp">${eur(c.bd)}</div></div>
      <div class="s"><div class="n">Laura</div><div class="v disp">${eur(c.ar)}</div></div>
      <div class="s"><div class="n">Externa</div><div class="v disp">${eur(c.ext)}</div></div></div>
  </div>
  <p class="lb mt">De onde vem</p><div class="card">`;
  c.funds.forEach(f=>{ const v=fundVal(f), got=v>0;
    const right = got?`<span class="dv">${eur(v)}</span>`
      :`<div style="text-align:right"><span class="muted">${f.notes||'por chegar'}</span><br><button class="mini" onclick="MODAL=()=>mReceive(${f.row},'${fundCol(f)}',${JSON.stringify(String(f.source)).replace(/"/g,'&quot;')});render()">marcar recebido</button></div>`;
    h+=`<div class="dbt"><div><div class="dl">${f.source}</div><div class="dn">${f.notes&&got?f.notes:(got?'recebido':'')}</div></div>${right}</div>`; });
  h+=`</div>`;
  if(c.costs && c.costs.length){ h+=`<p class="lb mt">Custos já pagos</p><div class="card"><div class="row"><span class="muted">Total</span><span class="disp" style="font-size:20px">${eur(c.costTotal)}</span></div></div>`; }
  const j=S.joint;
  if(j){ h+=`<p class="lb mt">Conta conjunta · este mês</p>
  <button class="card" style="width:100%;text-align:left;cursor:pointer;color:var(--text)" onclick="go('conjunta')">
    <div class="row"><span class="disp" style="font-size:26px">${eur(j.totalActive)}</span><span class="muted">Bruno ${eur(j.bdShare)} · Laura ${eur(j.arShare)} →</span></div></button>`; }
  return h+`</div>`;
}

/* ===== CONJUNTA ===== */
function recalcJoint(){ const j=S.joint; let t=0; j.items.forEach(i=>{ if(i.ativo) t+=i.valor; }); j.totalActive=t; j.bdShare=t*j.brunoPct/100; j.arShare=t-j.bdShare; }
async function togJoint(row,value){
  if(BUSY) return; BUSY=true; const it=S.joint.items.find(x=>x.row===row); if(it){ it.ativo=value; recalcJoint(); } render();
  try{ S=await api('toggle',{tab:'Joint',row,value}); }catch(e){ if(it){it.ativo=!value;recalcJoint();} toast('Não guardou',true); }
  BUSY=false; render();
}
function vConjunta(){
  const j=S.joint;
  if(!j){ return `<div class="pg">${header()}<div class="err-msg">Falta a tab Joint — corre setupTudo.</div></div>`; }
  let h=`<div class="pg">${header()}<h1 class="pgh disp">Conta conjunta</h1>
  <div class="dp"><div class="eyebrow">A transferir este mês</div><div class="big disp">${eur(j.totalActive)}</div>
    <div class="split2"><div class="s"><div class="n">Bruno · ${j.brunoPct}%</div><div class="v disp">${eur(j.bdShare)}</div></div>
      <div class="s"><div class="n">Laura · ${j.lauraPct}%</div><div class="v disp">${eur(j.arShare)}</div></div></div>
    <div class="meta" style="margin-top:10px">de ${eur(j.totalAll)} possível · <span onclick="MODAL=mSplit;render()" style="color:var(--accent);font-weight:800;cursor:pointer">ajustar split</span></div>
  </div><div class="card">`;
  const order=[],gr={};
  j.items.forEach(it=>{ const g=it.pocket||'Outros'; if(!gr[g]){gr[g]=[];order.push(g);} gr[g].push(it); });
  order.forEach(g=>{ h+=`<div class="grp">${g}</div>`;
    gr[g].forEach(it=>{ h+=`<div class="tr ${it.ativo?'':'off'}"><div><div class="tl">${it.desc}</div><div class="ta">dia ${it.dia} · ${eur(it.valor)}</div></div>
      <div class="sw ${it.ativo?'on':''} ${BUSY?'busy':''}" onclick="togJoint(${it.row},${!it.ativo})"><i></i></div></div>`; }); });
  h+=`</div><p class="muted" style="text-align:center;margin-top:8px">Desliga o que não conta este mês. Valores editam-se na folha.</p></div>`;
  return h;
}
function mSplit(){
  return `<div class="overlay" onclick="if(event.target===this){MODAL=null;render()}"><div class="sheet">
    <button class="mclose" onclick="MODAL=null;render()">×</button><h3 class="disp">Ajustar split</h3>
    <p class="muted" style="margin:-6px 0 14px">% do Bruno. A da Laura ajusta-se sozinha.</p>
    <label class="field"><span>Bruno (%)</span><input id="sp" class="inp" type="number" inputmode="numeric" value="${S.joint.brunoPct}" oninput="document.getElementById('spL').textContent=(100-(parseFloat(this.value)||0))"></label>
    <p class="muted" style="margin:-6px 0 16px">Laura: <b id="spL" style="color:var(--accent)">${S.joint.lauraPct}</b>%</p>
    <button class="cta" onclick="submitSplit()">Guardar</button></div></div>`;
}
async function submitSplit(){
  const b=parseFloat(document.getElementById('sp').value);
  if(isNaN(b)||b<0||b>100){ toast('0 a 100',true); return; }
  MODAL=null; VIEW='loading'; render();
  try{ S=await api('setSplit',{bruno:b}); VIEW='conjunta'; render(); toast('Split atualizado'); }
  catch(e){ VIEW='conjunta'; render(); toast('Erro: '+e.message,true); }
}

/* ===== GUIA ===== */
function isDone(who,item){ return S.log && S.log.some(e=>e.thisMonth && e.who===who && e.item===item); }
async function togDone(who,item,amount){
  if(BUSY) return; BUSY=true; render();
  try{ S=await api('logToggle',{quem:who,item:item,amount:amount}); }catch(e){ toast('Não guardou',true); }
  BUSY=false; render();
}
function vGuia(){
  const people=[['Bruno',S.bruno],['Laura',S.laura]];
  let h=`<div class="pg">${header()}<h1 class="pgh disp">Guia mensal</h1>`;
  let totalToDo=0, done=0;
  people.forEach(([who,b])=>{ if(!b) return;
    const trs=b.lines.filter(l=>l.kind==='transfer'&&l.ativo&&l.valor>0);
    if(!trs.length) return;
    h+=`<p class="lb mt">${who}</p><div class="card">`;
    trs.forEach(l=>{ const d=isDone(who,l.label); totalToDo++; if(d) done++;
      h+=`<div class="tr"><div><div class="tl">${l.label}</div><div class="ta">${eur(l.valor)}</div></div>
        <div class="chk ${d?'on':''} ${BUSY?'busy':''}" onclick="togDone('${who}',${JSON.stringify(l.label).replace(/"/g,'&quot;')},${l.valor})"></div></div>`; });
    h+=`</div>`;
  });
  const headTxt = totalToDo?`${done}/${totalToDo} feitas este mês`:'sem transferências ativas';
  h=h.replace('<h1 class="pgh disp">Guia mensal</h1>', `<h1 class="pgh disp">Guia mensal</h1><p class="muted" style="margin:-8px 0 14px">${headTxt}</p>`);
  h+=`<p class="muted" style="text-align:center;margin-top:8px">Toca para marcar como feita. Fica registada no Log e mantém-se este mês.</p></div>`;
  return h;
}

/* ===== PESSOAL ===== */
async function togBudget(who,row,value){
  if(BUSY) return; BUSY=true;
  const b=who==='Bruno'?S.bruno:S.laura; const ln=b.lines.find(x=>x.row===row);
  if(ln){ ln.ativo=value; b.activeTotal=b.lines.filter(l=>l.kind==='transfer'&&l.ativo).reduce((s,l)=>s+l.valor,0); }
  render();
  try{ S=await api('toggle',{tab:who,row,value}); }catch(e){ if(ln)ln.ativo=!value; toast('Não guardou',true); }
  BUSY=false; render();
}
function budgetCard(who,b){
  if(!b) return '';
  const trs=b.lines.filter(l=>l.kind==='transfer'), pks=b.lines.filter(l=>l.kind==='pocket');
  let h=`<p class="lb mt">${who} · income ${eur(b.income)}</p><div class="card">`;
  h+=`<div class="grp">Transferências</div>`;
  trs.forEach(l=>{ const blank=!l.valor && /free|livre/i.test(l.label);
    h+=`<div class="tr ${l.ativo?'':'off'}"><div><div class="tl">${l.label}</div><div class="ta">${l.valor?eur(l.valor):'—'}</div></div>
      <div class="sw ${l.ativo?'on':''} ${BUSY?'busy':''}" onclick="togBudget('${who}',${l.row},${!l.ativo})"><i></i></div></div>`; });
  if(pks.length){ h+=`<div class="grp">Pockets</div>`;
    pks.forEach(l=>{ h+=`<div class="tr ${l.ativo?'':'off'}"><div><div class="tl">${l.label}</div><div class="ta">${l.valor?eur(l.valor):'—'}</div></div>
      <div class="sw ${l.ativo?'on':''} ${BUSY?'busy':''}" onclick="togBudget('${who}',${l.row},${!l.ativo})"><i></i></div></div>`; }); }
  h+=`<div class="prow" style="border-top:1px solid var(--line);padding-top:12px;margin-top:12px"><span class="who">Total transferências ativas</span><span class="amt">${eur(b.activeTotal)}</span></div>`;
  return h+`</div>`;
}
function vPessoal(){
  let h=`<div class="pg">${header()}<h1 class="pgh disp">Pessoal</h1>
  <p class="muted" style="margin:-8px 0 14px">Desliga o que quiseres pausar (ex.: para reforçar a casa).</p>`;
  h+=budgetCard('Bruno',S.bruno)+budgetCard('Laura',S.laura);
  return h+`</div>`;
}

/* ===== modais ===== */
function mReceive(row,col,source){
  return `<div class="overlay" onclick="if(event.target===this){MODAL=null;render()}"><div class="sheet">
    <button class="mclose" onclick="MODAL=null;render()">×</button><h3 class="disp">${source} — recebido</h3>
    <p class="muted" style="margin:-6px 0 14px">Mete o valor que entrou (após câmbio/impostos, se aplicável).</p>
    <label class="field"><span>Valor (€)</span><input id="f_amt" class="inp" type="number" inputmode="decimal" placeholder="0"></label>
    <button class="cta" onclick="submitReceive(${row},'${col}')">Confirmar</button></div></div>`;
}
async function submitReceive(row,col){
  const amount=parseFloat((document.getElementById('f_amt').value||'').replace(',','.'));
  if(!amount||amount<=0){ toast('Mete um valor',true); return; }
  MODAL=null; VIEW='loading'; render();
  try{ S=await api('contribSet',{row,col,amount}); VIEW='home'; render(); toast('Registado 🎉'); }
  catch(e){ VIEW='home'; render(); toast('Erro: '+e.message,true); }
}

/* ===== nav ===== */
function nav(){
  const ic={home:'<path d="M3 11l9-8 9 8M5 10v10h5v-6h4v6h5V10"/>',
    conjunta:'<rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20M7 15h4"/>',
    guia:'<path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
    pessoal:'<circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 12 0v1"/>'};
  const item=(v,lbl)=>`<button class="${VIEW===v?'on':''}" onclick="go('${v}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ic[v]}</svg><span>${lbl}</span></button>`;
  return `<div class="nav">${item('home','Início')}${item('conjunta','Conjunta')}${item('guia','Guia')}${item('pessoal','Pessoal')}</div>`;
}
boot();
