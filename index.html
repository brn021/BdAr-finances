<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finanças">
<meta name="theme-color" content="#0a0b0d">
<title>PULSE · Finanças</title>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0b0d;--card:#15181e;--card2:#0c0e12;--line:rgba(255,255,255,.08);--text:#eceef1;--muted:#868d97;--dim:#3a4049;--accent:#3fdc6e;--blue:#58a6ff;--amber:#ffc23d;--warn:#ff6a3d}
body{background:var(--bg);color:var(--text);font-family:'Hanken Grotesk',-apple-system,system-ui,sans-serif;min-height:100dvh;-webkit-font-smoothing:antialiased}
.disp{font-family:'Big Shoulders Display',-apple-system,system-ui,sans-serif;font-weight:800;letter-spacing:.01em}
input{-webkit-appearance:none;font-family:inherit}
input[type=number]{-moz-appearance:textfield}
input::-webkit-inner-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{display:none}
.pg{padding:18px 16px 96px;max-width:560px;margin:0 auto}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.logo{display:flex;align-items:center;gap:8px;font-size:20px;letter-spacing:.16em}
.logo .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent)}
.sub{font-size:12.5px;color:var(--muted);font-weight:600}
.gear{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px}
.lb{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin:0 0 10px}
.lb.mt{margin-top:24px}
h1.pgh{font-size:26px;margin:0 0 16px}

/* DP hero */
.dp{background:linear-gradient(135deg,rgba(63,220,110,.16),rgba(12,14,18,.5));border:1px solid rgba(63,220,110,.3);border-radius:18px;padding:20px;margin-bottom:14px}
.dp .eyebrow{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--accent)}
.dp .big{font-size:40px;line-height:1;margin:8px 0 2px}
.dp .big small{font-size:18px;color:var(--muted)}
.bar{height:12px;border-radius:8px;background:#0c0e12;border:1px solid var(--line);overflow:hidden;margin:14px 0 6px}
.bar i{display:block;height:100%;background:linear-gradient(90deg,#2faf55,var(--accent));border-radius:8px;transition:width .6s cubic-bezier(.2,.7,.3,1)}
.dp .meta{font-size:13px;color:var(--muted)}
.contrib{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.cc{background:#0c0e1255;border:1px solid var(--line);border-radius:12px;padding:12px}
.cc .n{font-size:12px;color:var(--muted);font-weight:700}
.cc .v{font-size:22px;line-height:1;margin-top:4px;color:var(--accent)}

.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:12px}
.row{display:flex;justify-content:space-between;align-items:center}
.kpi{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.kpi .b{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
.kpi .b .n{font-size:11.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.kpi .b .v{font-size:26px;line-height:1;margin-top:6px}
.done{font-size:13px;font-weight:800}
.done.y{color:var(--accent)}.done.n{color:var(--muted)}

/* month pills */
.months{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px}
.mp{flex:0 0 auto;background:#0c0e12;border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:9px 13px;font-weight:800;font-size:13px;cursor:pointer}
.mp.on{background:var(--accent);color:#06140a;border-color:var(--accent)}

/* transfer person card */
.pcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px}
.pcard .ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.pcard .pn{font-size:17px;font-weight:800}
.pcard .pc{font-size:12.5px;color:var(--muted);margin-bottom:10px}
.tr{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 0;border-top:1px solid var(--line)}
.tr .tl{font-size:14.5px}
.tr .ta{font-size:12.5px;color:var(--muted)}
.sw{flex-shrink:0;width:50px;height:30px;border-radius:16px;background:#0c0e12;border:1px solid var(--line);position:relative;cursor:pointer;transition:.18s}
.sw i{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:var(--dim);transition:.18s}
.sw.on{background:var(--accent);border-color:var(--accent)}
.sw.on i{left:25px;background:#06140a}
.sw.busy{opacity:.5}

/* acertos */
.dbt{display:flex;justify-content:space-between;gap:10px;padding:11px 0;border-top:1px solid var(--line)}
.dbt:first-child{border-top:none}
.dbt .dl{font-size:14px}.dbt .dn{font-size:12px;color:var(--muted);margin-top:2px}
.dbt .dv{font-weight:800;color:var(--accent);white-space:nowrap}
.lg{display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:8px 0;border-top:1px solid var(--card2);color:var(--muted)}
.lg b{color:var(--text)}
.btns{display:flex;gap:8px;margin:14px 0 4px}
.btns button{flex:1;border-radius:12px;padding:13px;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit;border:1px solid var(--line);background:var(--card2);color:var(--text)}
.btns button.pri{background:var(--accent);color:#06140a;border:none}

/* inputs / setup / modal */
.field{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.field span{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.inp{width:100%;background:var(--card2);border:2px solid var(--line);border-radius:12px;padding:14px;color:var(--text);font-size:16px;outline:none;font-family:inherit}
.inp:focus{border-color:var(--accent)}
.cta{width:100%;padding:16px;border:none;border-radius:13px;background:var(--accent);color:#06140a;font-size:17px;font-weight:900;cursor:pointer;font-family:'Big Shoulders Display',sans-serif;letter-spacing:.04em}
.seg{display:flex;gap:6px;background:#0c0e12;border:1px solid var(--line);border-radius:11px;padding:4px}
.seg button{flex:1;background:none;border:none;color:var(--muted);font-family:inherit;font-weight:800;padding:9px;border-radius:8px;cursor:pointer}
.seg button.on{background:var(--accent);color:#06140a}
.overlay{position:fixed;inset:0;z-index:60;background:rgba(5,6,8,.8);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;padding:0}
.sheet{width:100%;max-width:560px;background:var(--card);border:1px solid var(--line);border-radius:20px 20px 0 0;padding:22px 18px max(22px,env(safe-area-inset-bottom))}
.sheet h3{font-size:22px;margin:0 0 14px}
.mclose{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;float:right;line-height:1}

/* bottom nav */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;justify-content:space-around;background:rgba(13,15,19,.94);backdrop-filter:blur(16px);border-top:1px solid var(--line);padding:8px 4px calc(8px + env(safe-area-inset-bottom,0px))}
.nav button{flex:1;background:none;border:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:4px;font-family:inherit;font-weight:700;font-size:10.5px;cursor:pointer;padding:4px 0}
.nav button.on{color:var(--accent)}
.nav svg{width:22px;height:22px}

.center{min-height:100dvh;display:flex;flex-direction:column;justify-content:center;padding:24px 18px;max-width:440px;margin:0 auto}
.spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--accent);color:#06140a;padding:10px 22px;border-radius:11px;font-weight:800;font-size:13.5px;z-index:99;animation:fo 2.4s forwards}
.toast.err{background:var(--warn);color:#fff}
@keyframes fo{0%,75%{opacity:1}100%{opacity:0}}
.err-msg{background:rgba(255,106,61,.12);border:1px solid rgba(255,106,61,.4);color:#ff9c80;padding:11px 14px;border-radius:10px;font-size:13.5px;margin-bottom:14px}
.muted{color:var(--muted);font-size:13px}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ===== config (URL + password ficam só neste telemóvel) ===== */
const BAKED_URL = "https://script.google.com/macros/s/AKfycbxFbrc6TBJQkGt93r5WgH4Jf_qx4bY_jbYwNj5hoF_8JjHGuOLv_cwclYosGxWTp-vLwQ/exec";
let API = localStorage.getItem('fin_api') || BAKED_URL || "";
let PW  = localStorage.getItem('fin_pw')  || "";

let S = null;            // último estado da folha
let VIEW = 'home';       // home | transfers | acertos
let MI = new Date().getMonth();  // mês selecionado
let TT = null, MODAL = null, BUSY = false;
const $ = () => document.getElementById('app');
const eur = n => '€' + Math.round(Number(n)||0).toLocaleString('pt-PT');

/* ===== API ===== */
async function api(action, extra){
  const body = JSON.stringify(Object.assign({action, password: PW}, extra||{}));
  const res = await fetch(API, {method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body, redirect:'follow'});
  const j = await res.json();
  if(!j.ok){ if(j.error==='auth'){ const e=new Error('auth'); e.auth=true; throw e; } throw new Error(j.error||'erro'); }
  return j.data;
}
function toast(msg, err){ TT={msg,err}; render(); setTimeout(()=>{TT=null;render();}, 2400); }

/* ===== boot ===== */
async function boot(){
  if(!API || !PW){ VIEW='setup'; render(); return; }
  VIEW='loading'; render();
  try{ S = await api('state'); VIEW='home'; render(); }
  catch(e){ if(e.auth){ localStorage.removeItem('fin_pw'); PW=''; VIEW='setup'; render(); toast('Password errada', true);} else { VIEW='error'; render(); } }
}

/* ===== actions ===== */
async function refresh(){ try{ S = await api('state'); render(); }catch(e){ toast('Erro a atualizar', true); } }

async function toggle(t, person){
  if(BUSY) return; BUSY=true;
  const col = 4 + MI, value = !t.ticks[MI];
  t.ticks[MI] = value;            // otimista
  render();
  try{ S = await api('toggle', {row:t.row, col, value, person}); }
  catch(e){ t.ticks[MI] = !value; toast('Não guardou', true); }
  BUSY=false; render();
}

async function submitPayment(){
  const amount = parseFloat((document.getElementById('p_amt').value||'').replace(',','.'));
  const from = document.getElementById('p_from').value;
  const notas = document.getElementById('p_notas').value;
  if(!amount||amount<=0){ toast('Mete um valor', true); return; }
  MODAL=null; VIEW='loading'; render();
  try{ S = await api('addPayment', {amount, from, to: from==='AR'?'BD':'AR', notas}); VIEW='acertos'; render(); toast('Pagamento registado'); }
  catch(e){ VIEW='acertos'; render(); toast('Erro: '+e.message, true); }
}
async function submitDebt(){
  const orig = parseFloat((document.getElementById('d_orig').value||'').replace(',','.'));
  const de = document.getElementById('d_de').value;
  const notas = document.getElementById('d_notas').value;
  if(!orig||orig<=0){ toast('Mete um valor', true); return; }
  if(!notas.trim()){ toast('Descreve o acerto', true); return; }
  MODAL=null; VIEW='loading'; render();
  try{ S = await api('addDebt', {orig, de, para: de==='BD'?'AR':'BD', notas}); VIEW='acertos'; render(); toast('Acerto adicionado'); }
  catch(e){ VIEW='acertos'; render(); toast('Erro: '+e.message, true); }
}

/* ===== setup ===== */
function saveSetup(){
  const url = BAKED_URL || document.getElementById('s_url').value.trim();
  const pw = document.getElementById('s_pw').value;
  if(!url){ toast('Falta o link', true); return; }
  if(!pw){ toast('Falta a password', true); return; }
  API=url; PW=pw;
  $().innerHTML = '<div class="center"><div class="spin"></div><p class="muted" style="text-align:center;margin-top:16px">A ligar à folha…</p></div>';
  api('state').then(d=>{ S=d; localStorage.setItem('fin_api',API); localStorage.setItem('fin_pw',PW); VIEW='home'; render(); })
    .catch(e=>{ VIEW='setup'; render(); toast(e.auth?'Password errada':'Não consegui ligar — confirma o link', true); });
}
function logout(){ localStorage.removeItem('fin_pw'); PW=''; S=null; VIEW='setup'; render(); }

/* ===== render ===== */
function render(){
  const a = $();
  if(VIEW==='setup'){ a.innerHTML = vSetup(); return; }
  if(VIEW==='loading'){ a.innerHTML = '<div class="center"><div class="spin"></div></div>' + tt(); return; }
  if(VIEW==='error'){ a.innerHTML = '<div class="center"><div class="err-msg">Não consegui ligar à folha. Verifica a ligação e tenta outra vez.</div><button class="cta" onclick="boot()">Tentar de novo</button><button class="gear" style="margin-top:14px" onclick="logout()">Mudar definições</button></div>'; return; }
  let h = '';
  if(VIEW==='home') h = vHome();
  if(VIEW==='transfers') h = vTransfers();
  if(VIEW==='acertos') h = vAcertos();
  a.innerHTML = h + nav() + (MODAL?MODAL():'') + tt();
}
function tt(){ return TT?`<div class="toast ${TT.err?'err':''}">${TT.msg}</div>`:''; }
function go(v){ VIEW=v; render(); }

function header(title){
  return `<div class="top"><div class="logo disp"><span class="dot"></span>FINANÇAS</div>
    <button class="gear" onclick="logout()">⚙</button></div>`;
}

function vSetup(){
  return `<div class="center">
    <div class="logo disp" style="font-size:24px;margin-bottom:6px"><span class="dot"></span>FINANÇAS</div>
    <p class="sub" style="margin-bottom:22px">Bruno &amp; Laura</p>
    ${BAKED_URL?'':`<label class="field"><span>Link da app (Web App URL)</span><input id="s_url" class="inp" placeholder="https://script.google.com/macros/s/.../exec"></label>`}
    <label class="field"><span>Password partilhada</span><input id="s_pw" class="inp" type="password" placeholder="••••••••"></label>
    <button class="cta" onclick="saveSetup()">Ligar</button>
    <p class="muted" style="margin-top:16px;text-align:center">Os dados ficam na vossa folha Google. Isto só guarda o acesso neste telemóvel.</p>
  </div>`;
}

function vHome(){
  const dp=S.DP, pct=Math.max(0,Math.min(100, dp.target? dp.balance/dp.target*100:0));
  const cm=S.currentMonth, mname=S.months[cm];
  const months = dp.months==='✓'?'objetivo atingido':`faltam ~${dp.months} meses`;
  return `<div class="pg">${header()}
  <div class="dp">
    <div class="eyebrow">Entrada da casa</div>
    <div class="big disp">${eur(dp.balance)}<small> / ${eur(dp.target)}</small></div>
    <div class="bar"><i style="width:${pct}%"></i></div>
    <div class="meta">Faltam <b style="color:var(--text)">${eur(dp.remaining)}</b> · ${months} · ${eur(dp.combined)}/mês</div>
    <div class="contrib">
      <div class="cc"><div class="n">Bruno meteu</div><div class="v disp">${eur(dp.bd)}</div></div>
      <div class="cc"><div class="n">Laura meteu</div><div class="v disp">${eur(dp.ar)}</div></div>
    </div>
  </div>

  <p class="lb mt">${mname} — transferências</p>
  <div class="kpi">
    <div class="b"><div class="n">Bruno</div><div class="v disp">${eur(S.confirmedBD[cm])} <span class="done ${S.doneBD[cm]==='✓'?'y':'n'}" style="font-size:16px">${S.doneBD[cm]==='✓'?'✓ ok':'em falta'}</span></div></div>
    <div class="b"><div class="n">Laura</div><div class="v disp">${eur(S.confirmedAR[cm])} <span class="done ${S.doneAR[cm]==='✓'?'y':'n'}" style="font-size:16px">${S.doneAR[cm]==='✓'?'✓ ok':'em falta'}</span></div></div>
  </div>
  <button class="cta" onclick="MI=${cm};go('transfers')">Registar transferências →</button>
  </div>`;
}

function vTransfers(){
  const col=4+MI;
  const person=(title,sub,list,confirmed,done,who)=>{
    let r=`<div class="pcard"><div class="ph"><span class="pn">${title}</span><span class="done ${done==='✓'?'y':'n'}">${done==='✓'?'✓ completo':'em falta'}</span></div><div class="pc">${sub} · ${eur(confirmed)} confirmados</div>`;
    list.forEach((t,i)=>{ const on=t.ticks[MI];
      r+=`<div class="tr"><div><div class="tl">${t.label}</div><div class="ta">${eur(t.amount)}</div></div>
        <div class="sw ${on?'on':''} ${BUSY?'busy':''}" onclick="toggle(S.${who}[${i}],'${who==='bd'?'BD':'AR'}')"><i></i></div></div>`;});
    return r+`</div>`;
  };
  let h=`<div class="pg">${header()}<h1 class="pgh disp">Transferências</h1>
  <div class="months">`;
  S.months.forEach((m,i)=>{ h+=`<button class="mp ${i===MI?'on':''}" onclick="MI=${i};render()">${m}</button>`; });
  h+=`</div>`;
  h+=person('Bruno','do BDaib', S.bd, S.confirmedBD[MI], S.doneBD[MI], 'bd');
  h+=person('Laura','do ARaib / ARrev', S.ar, S.confirmedAR[MI], S.doneAR[MI], 'ar');
  h+=`<p class="muted" style="text-align:center;margin-top:8px">Toca para marcar uma transferência como feita. Guarda na folha automaticamente.</p></div>`;
  return h;
}

function vAcertos(){
  const ac=S.acertos, t=ac.totals, paid=Math.max(0,t.orig-t.remaining), pct=t.orig?paid/t.orig*100:0;
  const mtxt = t.months==='✓'?'tudo saldado':`faltam ~${t.months} meses`;
  let h=`<div class="pg">${header()}<h1 class="pgh disp">Acertos</h1>
  <div class="card">
    <div class="row"><span class="lb" style="margin:0">Em falta</span><span class="muted">${eur(t.permonth)}/mês · ${mtxt}</span></div>
    <div class="big disp" style="font-size:36px;margin:6px 0 0">${eur(t.remaining)}</div>
    <div class="bar"><i style="width:${pct}%"></i></div>
    <div class="muted">Pago ${eur(paid)} de ${eur(t.orig)}</div>
    <div class="btns"><button class="pri" onclick="MODAL=mPayment;render()">+ Registar pagamento</button><button onclick="MODAL=mDebt;render()">+ Acerto</button></div>
  </div>`;
  h+=`<p class="lb mt">Em aberto</p><div class="card">`;
  if(!ac.debts.length) h+=`<p class="muted">Sem acertos.</p>`;
  ac.debts.forEach(d=>{ h+=`<div class="dbt"><div><div class="dl">${d.notas||(d.de+' → '+d.para)}</div><div class="dn">${d.de} → ${d.para}</div></div><div class="dv">${eur(d.orig)}</div></div>`; });
  h+=`</div>`;
  if(ac.log.length){ h+=`<p class="lb mt">Pagamentos</p><div class="card">`;
    ac.log.forEach(l=>{ h+=`<div class="lg"><span>${l.date} · ${l.from}→${l.to}${l.notas?' · '+l.notas:''}</span><b>${eur(l.amount)}</b></div>`; });
    h+=`</div>`; }
  return h+`</div>`;
}

/* ===== modais ===== */
function mPayment(){ const def=S.acertos.totals.permonth||170;
  return `<div class="overlay" onclick="if(event.target===this){MODAL=null;render()}"><div class="sheet">
    <button class="mclose" onclick="MODAL=null;render()">×</button><h3 class="disp">Registar pagamento</h3>
    <label class="field"><span>Quem pagou</span><div class="seg" id="p_from_seg">
      <button class="on" onclick="selSeg('p_from','AR',this)">Laura → Bruno</button>
      <button onclick="selSeg('p_from','BD',this)">Bruno → Laura</button></div><input type="hidden" id="p_from" value="AR"></label>
    <label class="field"><span>Valor (€)</span><input id="p_amt" class="inp" type="number" inputmode="decimal" value="${def}"></label>
    <label class="field"><span>Nota (opcional)</span><input id="p_notas" class="inp" placeholder="ex.: acerto mensal"></label>
    <button class="cta" onclick="submitPayment()">Guardar pagamento</button>
  </div></div>`; }
function mDebt(){
  return `<div class="overlay" onclick="if(event.target===this){MODAL=null;render()}"><div class="sheet">
    <button class="mclose" onclick="MODAL=null;render()">×</button><h3 class="disp">Novo acerto</h3>
    <label class="field"><span>Quem deve a quem</span><div class="seg">
      <button class="on" onclick="selSeg('d_de','BD',this)">Bruno deve à Laura</button>
      <button onclick="selSeg('d_de','AR',this)">Laura deve ao Bruno</button></div><input type="hidden" id="d_de" value="BD"></label>
    <label class="field"><span>Valor (€)</span><input id="d_orig" class="inp" type="number" inputmode="decimal" placeholder="0"></label>
    <label class="field"><span>Descrição</span><input id="d_notas" class="inp" placeholder="ex.: jantar + portagens"></label>
    <button class="cta" onclick="submitDebt()">Adicionar acerto</button>
  </div></div>`; }
function selSeg(id,val,btn){ document.getElementById(id).value=val; [...btn.parentElement.children].forEach(b=>b.classList.remove('on')); btn.classList.add('on'); }

/* ===== nav ===== */
function nav(){
  const ic={home:'<path d="M3 11l9-8 9 8M5 10v10h5v-6h4v6h5V10"/>',
    transfers:'<path d="M7 7h11l-3-3M17 17H6l3 3"/>',
